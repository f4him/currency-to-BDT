<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BD Currency Converter</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #ffffff;
        color: #1a1a1a;
        width: 300px;
        min-height: 280px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 12px;
        border-bottom: 1px solid #f0f0f0;
      }

      .header-title {
        font-size: 15px;
        font-weight: 600;
        color: #1a1a1a;
      }

      .rate-badge {
        font-size: 11px;
        background: #e1f5ee;
        color: #085041;
        border-radius: 6px;
        padding: 3px 8px;
        font-weight: 500;
      }

      .body {
        padding: 14px 16px;
      }

      .from-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      select {
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        color: #1a1a1a;
        cursor: pointer;
        outline: none;
      }

      select:focus {
        border-color: #1d9e75;
      }

      input[type="number"] {
        flex: 1;
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 15px;
        font-weight: 500;
        color: #1a1a1a;
        outline: none;
        appearance: textfield;
      }

      input[type="number"]:focus {
        border-color: #1d9e75;
        background: #fff;
      }
      input[type="number"]::-webkit-inner-spin-button {
        display: none;
      }

      .divider {
        height: 1px;
        background: #f0f0f0;
        margin: 12px 0;
      }

      .result-block {
        background: #f8fffe;
        border: 1px solid #d0ede5;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 10px;
      }

      .result-bdt-label {
        font-size: 11px;
        color: #0f6e56;
        font-weight: 500;
        margin-bottom: 4px;
      }

      .result-bdt-amount {
        font-size: 26px;
        font-weight: 700;
        color: #0a5c45;
        letter-spacing: -0.5px;
      }

      .other-results {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .other-item {
        background: #f5f5f5;
        border-radius: 8px;
        padding: 8px 10px;
      }

      .other-label {
        font-size: 11px;
        color: #888;
      }
      .other-value {
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-top: 1px;
      }

      .footer {
        padding: 8px 16px 12px;
        font-size: 11px;
        color: #aaa;
        text-align: center;
      }

      .footer a {
        color: #1d9e75;
        text-decoration: none;
      }

      .error-msg {
        font-size: 12px;
        color: #cc4444;
        background: #fff0f0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="header-title">BDT Converter</span>
      <span class="rate-badge" id="rate-badge">Loading...</span>
    </div>

    <div class="body">
      <div class="from-row">
        <select id="currency-select">
          <option value="USD">🇺🇸 USD</option>
          <option value="EUR">🇪🇺 EUR</option>
          <option value="GBP">🇬🇧 GBP</option>
          <option value="JPY">🇯🇵 JPY</option>
          <option value="INR">🇮🇳 INR</option>
          <option value="AUD">🇦🇺 AUD</option>
          <option value="CAD">🇨🇦 CAD</option>
          <option value="SGD">🇸🇬 SGD</option>
          <option value="SAR">🇸🇦 SAR</option>
          <option value="AED">🇦🇪 AED</option>
        </select>
        <input
          type="number"
          id="amount-input"
          value="100"
          min="0"
          step="any"
          placeholder="Amount"
        />
      </div>

      <div class="result-block">
        <div class="result-bdt-label">Bangladeshi Taka (BDT)</div>
        <div class="result-bdt-amount" id="bdt-result">—</div>
      </div>

      <div class="other-results">
        <div class="other-item">
          <div class="other-label">USD</div>
          <div class="other-value" id="usd-result">—</div>
        </div>
        <div class="other-item">
          <div class="other-label">EUR</div>
          <div class="other-value" id="eur-result">—</div>
        </div>
        <div class="other-item">
          <div class="other-label">GBP</div>
          <div class="other-value" id="gbp-result">—</div>
        </div>
        <div class="other-item">
          <div class="other-label">INR</div>
          <div class="other-value" id="inr-result">—</div>
        </div>
      </div>

      <div id="error-msg" class="error-msg" style="display: none">
        Could not load rates. Check your API key in background.js.
      </div>
    </div>

    <div class="footer" id="footer">
      Rate data from
      <a href="https://www.exchangerate-api.com" target="_blank"
        >exchangerate-api.com</a
      >
    </div>

    <script src="popup.js"></script>
  </body>
</html>
